name: CI

on:
  pull_request:
    branches: [main, master]
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install

      - name: Format, lint, type-check
        run: deno task check

      - name: Test
        run: deno test -A --no-check
